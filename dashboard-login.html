<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Login</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #0f172a;
            color: #e2e8f0;
            font-family: system-ui, sans-serif;
        }
        .login-panel {
            width: min(92vw, 360px);
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 28px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.25);
        }
        h1 { margin: 0 0 6px; font-size: 24px; }
        p { margin: 0 0 22px; color: #94a3b8; font-size: 14px; }
        label {
            display: block;
            margin: 14px 0 6px;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 700;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 12px;
            background: #0f172a;
            color: #f8fafc;
            font-size: 15px;
        }
        button {
            width: 100%;
            margin-top: 20px;
            border: 0;
            border-radius: 6px;
            padding: 12px;
            background: #38bdf8;
            color: #082f49;
            font-weight: 800;
            cursor: pointer;
        }
        .error {
            display: none;
            margin-top: 14px;
            color: #fca5a5;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <form class="login-panel" method="POST" action="/dashboard-login">
        <h1>Dashboard Login</h1>
        <p>Enter the dashboard credentials to view live simulation analytics.</p>
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" required>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button type="submit">Log In</button>
        <div class="error" id="loginError">Invalid username or password.</div>
    </form>
    <script>
        if (new URLSearchParams(window.location.search).has('error')) {
            document.getElementById('loginError').style.display = 'block';
        }
    </script>
</body>
</html>
