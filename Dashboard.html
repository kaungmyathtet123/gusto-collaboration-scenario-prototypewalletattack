<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Awareness Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; padding: 30px; margin: 0; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #1e293b; padding: 25px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card h3 { margin: 0 0 10px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }
        .card .num { font-size: 36px; font-weight: bold; color: #38bdf8; }
        .table-section { background: #1e293b; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 15px; }
        th, td { padding: 14px; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; text-transform: uppercase; font-size: 13px; }
        .v-badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .v-high { background: rgba(239,68,68,0.2); color: #f87171; }
        .v-safe { background: rgba(34,197,94,0.2); color: #4ade80; }
        .admin-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .reset-btn { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="admin-bar">
        <h2>Live Security Simulation Analytics</h2>
        <button class="reset-btn" id="resetBtn">⚠️ Clear Database Records</button>
    </div>

    <div class="grid-cards">
        <div class="card"><h3>Total QR Scans</h3><div class="num" id="totalScans">-</div></div>
        <div class="card"><h3>Forms Submitted</h3><div class="num" id="totalSubmissions">-</div></div>
        <div class="card"><h3>Total PIN Inputs</h3><div class="num" id="totalPins">-</div></div>
    </div>

    <div class="table-section">
        <h3>Stream Vulnerability Classification Tree</h3>
        <table>
            <thead>
                <tr>
                    <th>Academic Stream</th>
                    <th>Forms Verified</th>
                    <th>PINs Leaked</th>
                    <th>Calculated Vulnerability Rate</th>
                </tr>
            </thead>
            <tbody id="metricsTableBody">
                </tbody>
        </table>
    </div>

    <script>
        function fetchMetrics() {
            fetch('/api/metrics')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('totalScans').innerText = data.scans || 0;
                    document.getElementById('totalSubmissions').innerText = data.submissions || 0;
                    document.getElementById('totalPins').innerText = data.pinInputs || 0;

                    const programsMapping = {
                        "IT": "IT / Systems Engineering",
                        "Business": "Business Support",
                        "Level3": "Level 3 Foundation",
                        "GUF": "GUF Foundations",
                        "GED": "GED Program",
                        "Pre-GED": "Pre-GED Program"
                    };

                    const tbody = document.getElementById('metricsTableBody');
                    tbody.innerHTML = ""; // Clear loader framework elements

                    Object.keys(programsMapping).forEach(key => {
                        const progData = data.programs[key] || { forms: 0, pinInputs: 0 };
                        const formsCount = progData.forms || 0;
                        const pinsCount = progData.pinInputs || 0;
                        
                        // Calculate metrics logic loop safety check parameters
                        let vulnerabilityRate = 0;
                        if (formsCount > 0) {
                            vulnerabilityRate = Math.round((pinsCount / formsCount) * 100);
                        }

                        const badgeClass = vulnerabilityRate > 30 ? "v-high" : "v-safe";

                        const row = `<tr>
                            <td><strong>${programsMapping[key]}</strong></td>
                            <td>${formsCount}</td>
                            <td>${pinsCount}</td>
                            <td><span class="v-badge ${badgeClass}">${vulnerabilityRate}% Risk</span></td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });
                });
        }

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm("Are you completely sure you want to flush all testing metrics to 0?")) {
                fetch('/api/reset-metrics', { method: 'POST' })
                    .then(() => { alert("Database purged successfully."); fetchMetrics(); });
            }
        });

        // Initialize display context elements
        fetchMetrics();
    </script>
</body>
</html>
