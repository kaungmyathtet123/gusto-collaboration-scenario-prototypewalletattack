<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUSTO Partnership Campaign Live Analytics</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Deep navy/slate background */
            color: #f8fafc;
            margin: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .dashboard-container {
            width: 100%;
            max-width: 900px;
        }

        /* Top Header Area matching your design token requirements */
        .header-panel {
            text-align: center;
            margin-bottom: 32px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 20px;
        }

        .header-panel h1 {
            font-size: 24px;
            color: #38bdf8; /* Bright energetic blueaccent */
            margin: 0 0 8px 0;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .header-panel p {
            color: #94a3b8;
            margin: 0;
            font-size: 14px;
        }

        /* Grid metrics cards system */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        .metric-card:hover {
            border-color: #38bdf8;
            transform: translateY(-2px);
        }

        .metric-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .metric-value {
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            margin: 0;
        }

        /* Status & Technical Fallback indicator footer */
        .status-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 12px;
            color: #94a3b8;
            border: 1px solid #334155;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e; /* Live green */
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    
    <div class="header-panel">
        <h1>On-Campus Interaction Analytics</h1>
        <p>Real-Time Behavioral Metrics Tracker — GUSTO College System Integration</p>
    </div>

    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-label">Total QR Scans</div>
            <div class="metric-value" id="scanCount">0</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Button Clicks</div>
            <div class="metric-value" id="clickCount">0</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Forms Verified</div>
            <div class="metric-value" id="submissionCount">0</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Completed Flows</div>
            <div class="metric-value" id="paymentCount">0</div>
        </div>
    </div>

    <div class="status-footer">
        <div class="status-indicator">
            <div class="pulse-dot"></div>
            <span id="connectionStatus">System Engine Active: Live Auto-Polling (3s)</span>
        </div>
        <div>Server Stream: Active</div>
    </div>

</div>

<script>
    function fetchLiveMetrics() {
        fetch('/api/metrics')
            .then(response => {
                if (!response.ok) throw new Error('Network stream error');
                return response.json();
            })
            .then(data => {
                // 1. Update your original core layout tracking cards
                document.getElementById('scanCount').innerText = data.scans !== undefined ? data.scans : 0;
                document.getElementById('clickCount').innerText = data.clicks !== undefined ? data.clicks : 0;
                document.getElementById('submissionCount').innerText = data.submissions !== undefined ? data.submissions : 0;
                document.getElementById('paymentCount').innerText = data.payments !== undefined ? data.payments : 0;
                
                // NEW FEATURE: Update a PIN input counter panel if you have one on your layout
                if (document.getElementById('pinInputCount')) {
                    document.getElementById('pinInputCount').innerText = data.pinInputs !== undefined ? data.pinInputs : 0;
                }

                // 2. Update Program Stream Categories (Maps to your select option values)
                if (document.getElementById('prog-IT')) document.getElementById('prog-IT').innerText = data.programs["IT"] || 0;
                if (document.getElementById('prog-Business')) document.getElementById('prog-Business').innerText = data.programs["Business"] || 0;
                if (document.getElementById('prog-Level3')) document.getElementById('prog-Level3').innerText = data.programs["Level3"] || 0;
                if (document.getElementById('prog-GUF')) document.getElementById('prog-GUF').innerText = data.programs["GUF"] || 0;
                if (document.getElementById('prog-GED')) document.getElementById('prog-GED').innerText = data.programs["GED"] || 0;
                if (document.getElementById('prog-PreGED')) document.getElementById('prog-PreGED').innerText = data.programs["Pre-GED"] || 0;

                // 3. Update Selected Mobile Payment Application Gateways
                if (document.getElementById('wallet-KBZ')) document.getElementById('wallet-KBZ').innerText = data.wallets["KBZ Pay"] || 0;
                if (document.getElementById('wallet-AYA')) document.getElementById('wallet-AYA').innerText = data.wallets["AYA Pay"] || 0;
                if (document.getElementById('wallet-Wave')) document.getElementById('wallet-Wave').innerText = data.wallets["Wave Pay"] || 0;

                document.getElementById('connectionStatus').innerText = "System Engine Active: Live Synchronization Synced";
                document.getElementById('connectionStatus').style.color = "#94a3b8";
            })
            .catch(error => {
                console.error('Metrics sync loop exception:', error);
                document.getElementById('connectionStatus').innerText = "Connection lost. Re-attempting pipeline connection...";
                document.getElementById('connectionStatus').style.color = "#ef4444";
            });
    }

    window.addEventListener('DOMContentLoaded', () => {
        fetchLiveMetrics();
        setInterval(fetchLiveMetrics, 3000); // Polls every 3 seconds
    });
</script>

</body>
</html>
